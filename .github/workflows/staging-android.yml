name: Android QA Build

on:
  # Manually run this function.
  workflow_dispatch:

env:
  APP_FRONTEND_URL: https://app.amigosapp.nl
  BUILD_TYPE: Release
  PACKAGE_NAME: com.whoisup.app

jobs:
  build:
    name: Build
    environment: staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: |
          npm ci -f
          npx cap sync android

      - name: Install Fastlane
        run: |
          sudo gem install fastlane

      - name: Create local.properties file
        env:
          MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          echo "MAPS_API_KEY=$MAPS_API_KEY" >> android/local.properties

      - name: Create keystores directory
        run: mkdir -p keystores

      - name: Create Android JKS File
        env:
          ANDROID_JKS_BASE64: ${{ secrets.ANDROID_JKS_BASE64 }}
        run: echo "$ANDROID_JKS_BASE64" | base64 --decode > keystores/android.jks

      - name: Build and Upload to Play Store Internal Testing
        env:
          SUPPLY_JSON_KEY_DATA: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
          SUPPLY_PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
          KEYSTORE_PATH: ${{ github.workspace }}/keystores/android.jks
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS_PASSWORD: ${{ secrets.KEY_ALIAS_PASSWORD }}
          BUILD_TYPE: ${{ env.BUILD_TYPE }}
          BUILD_GRADLE_PATH: ${{ github.workspace }}/android/app/build.gradle
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          fastlane android internal

      - name: Upload Debug APK
        if: ${{ env.BUILD_TYPE == 'Debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        if: ${{ env.BUILD_TYPE == 'Release' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
