<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amigo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background-color: #ff7337;
            box-sizing: border-box;
            padding: 50px;
            color: white;
            font-size: 1em;
        }

        h2 {
            font-weight: 600;
            width: 100%;
            text-align: center;
        }

        img {
            max-height: 50%;
        }

        button {
            padding: 0.7em;
            width: 70%;
            background-color: #7a28cb;
            font-size: 1.2em;
            border-radius: 20px;
            color: white;
            border: 0;
        }
    </style>
</head>
<body>
    <img src="splash.png" />

    <h2>There is no connection to the server</h2>

    <button onclick="retry()">Retry</button>
</body>

<script src="capacitor.js"></script>
<script>
    function connect() {
        if (navigator.onLine) {
            // capacitorExports.Plugins.Browser.prefetch({ urls: ['https://app.amigoapp.nl'] })
            capacitorExports.Browser.open({ url: 'https://app.amigoapp.nl' })
        }
    }

    // connect();

    function retry() {
        connect();
    }
</script>
</html>
