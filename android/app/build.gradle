 apply plugin: 'com.android.application'

android {
    namespace "com.whoisup.app"
    compileSdkVersion rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.whoisup.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1090300
        versionName "1.9.3"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

android.defaultConfig.manifestPlaceholders = [
  // change to the 'custom_url_scheme' value in your strings.xml. They need to be the same. e.g.
  "appAuthRedirectScheme": "com.whoisup.app"
]

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
    mavenCentral()
//    jcenter()
}


dependencies {
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation project(':capacitor-android')
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation "com.google.firebase:firebase-messaging:$firebaseMessagingVersion"
    implementation 'com.google.firebase:firebase-analytics:21.3.0'
    // Facebook Core library is needed for Facebook Events to work.
    // It's actually also included in all other libraries (like facebook-login for example).
    // But we've added it redundantly to make sure it gets included whenever we get rid of facebook-login for example.
    implementation 'com.facebook.android:facebook-core:14.1.1'
    // Facebook Login library
    implementation 'com.facebook.android:facebook-login:14.1.1'
    implementation 'com.google.android.gms:play-services-auth:20.7.0'

    // Branch: required for all Android apps
    implementation 'io.branch.sdk.android:library:5.9.0'

    // Branch: required if your app is in the Google Play Store (tip: avoid using bundled play services libs)
    implementation 'com.google.android.gms:play-services-ads-identifier:18.0.1' // GAID matching

    // Branch: optional
    implementation "androidx.browser:browser:$androidxBrowserVersion" // Chrome Tab matching (enables 100% guaranteed matching based on cookies)
}

apply from: 'capacitor.build.gradle'
apply plugin: 'org.jetbrains.kotlin.android'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.warn("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
