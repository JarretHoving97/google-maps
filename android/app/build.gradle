 apply plugin: 'com.android.application'

android {
    namespace "com.whoisup.app"
    compileSdk rootProject.ext.compileSdkVersion
    buildFeatures {
        compose true
    }
    composeOptions {
        kotlinCompilerExtensionVersion = "1.5.11"
    }
    compileOptions {
        coreLibraryDesugaringEnabled true
    }
    defaultConfig {
        applicationId "com.whoisup.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1092600
        versionName "1.9.26"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        Properties properties = new Properties()
        properties.load(project.rootProject.file('local.properties').newDataInputStream())
        manifestPlaceholders = [
            "googleMapsApiKey": "${properties.getProperty('MAPS_API_KEY')}",
            // change `appAuthRedirectScheme` to the `custom_url_scheme` value in your strings.xml. They need to be the same. e.g.
            "appAuthRedirectScheme": "com.whoisup.app"
        ]
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
    mavenCentral()
//    jcenter()
}


dependencies {
    def composeBom = platform('androidx.compose:compose-bom:2024.04.00')
    implementation composeBom

    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation project(':capacitor-android')
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation "com.google.firebase:firebase-messaging:$firebaseMessagingVersion"
    implementation 'com.google.firebase:firebase-analytics:21.3.0'
    // Facebook Core library is needed for Facebook Events to work.
    // It's actually also included in all other libraries (like facebook-login for example).
    // But we've added it redundantly to make sure it gets included whenever we get rid of facebook-login for example.
    implementation 'com.facebook.android:facebook-core:14.1.1'
    // Facebook Login library
    implementation 'com.facebook.android:facebook-login:14.1.1'
    implementation 'com.google.android.gms:play-services-auth:20.7.0'

    // Branch: required for all Android apps
    implementation 'io.branch.sdk.android:library:5.9.0'

    // Branch: required if your app is in the Google Play Store (tip: avoid using bundled play services libs)
    implementation 'com.google.android.gms:play-services-ads-identifier:18.0.1' // GAID matching

    // Branch: optional
    implementation "androidx.browser:browser:$androidxBrowserVersion" // Chrome Tab matching (enables 100% guaranteed matching based on cookies)

    // Jetpack Compose
    // Android Studio Preview support
    implementation 'androidx.compose.ui:ui-tooling-preview'
    // Build directly on top of foundational components
    implementation 'androidx.compose.material:material'
    implementation 'androidx.compose.foundation:foundation'
    // Integration with activities
    implementation 'androidx.activity:activity-compose:1.8.2'
    // Integration with ViewModels
    implementation 'androidx.lifecycle:lifecycle-viewmodel-compose:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-compose:2.7.0'

    // Accompanist Permissions
    implementation "com.google.accompanist:accompanist-permissions:0.34.0"

    // Coil
    implementation("io.coil-kt:coil-compose:2.7.0")
    implementation("io.coil-kt:coil-svg:2.7.0")
    implementation("io.coil-kt:coil-gif:2.7.0")


    // Stream
    implementation "io.getstream:stream-chat-android-compose:6.5.2"
    implementation "io.getstream:stream-chat-android-offline:6.5.2"
    implementation "io.getstream:stream-android-push-firebase:1.1.8"

    // Zoomable
    implementation "net.engawapg.lib:zoomable:1.6.1"

    // Reorderable
    implementation("sh.calvin.reorderable:reorderable:3.0.0")

    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.2"
}

apply from: 'capacitor.build.gradle'
apply plugin: 'org.jetbrains.kotlin.android'
apply plugin: 'kotlin-parcelize'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.warn("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
